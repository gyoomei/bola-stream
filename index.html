  <style>
    :root {
      --bg: #f5f8fc;
      --surface: rgba(255, 255, 255, 0.82);
      --surface-hover: rgba(255, 255, 255, 0.96);
      --border: rgba(16, 24, 40, 0.08);
      --border-hover: rgba(16, 24, 40, 0.16);
      --text: #102033;
      --text-secondary: #667085;
      --accent-green: #00e5a0;
      --accent-blue: #00d4ff;
      --accent-purple: #a855f7;
      --accent-orange: #fb923c;
      --accent-pink: #f472b6;
      --accent-yellow: #facc15;
      --accent-red: #f87171;
      --danger: #ff4757;
      --star: #ffd700;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: linear-gradient(180deg, rgba(245,248,252,0.92), rgba(245,248,252,0.82)), url('bg.jpg') no-repeat center center scroll;
      background-size: cover;
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, rgba(245,248,252,0.54), rgba(245,248,252,0.12));
      z-index: 0;
      pointer-events: none;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.22;
      pointer-events: none;
      z-index: 0;
      animation: float 18s ease-in-out infinite;
    }
    .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(0,229,160,0.20), transparent 70%); top: -150px; left: -100px; }
    .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(0,212,255,0.18), transparent 70%); top: 28%; right: -150px; animation-delay: -6s; }
    .orb-3 { width: 450px; height: 450px; background: radial-gradient(circle, rgba(168,85,247,0.14), transparent 70%); bottom: -120px; left: 18%; animation-delay: -12s; }
    .orb-4 { width: 280px; height: 280px; background: radial-gradient(circle, rgba(251,146,60,0.14), transparent 70%); top: 60%; left: -80px; animation-delay: -9s; animation-duration: 24s; }
    @keyframes float { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(40px,-40px) scale(1.08); } 66% { transform: translate(-30px,30px) scale(0.92); } }

    .noise {
      position: fixed;
      inset: 0;
      opacity: 0.035;
      z-index: 1;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 1120px;
      margin: 0 auto;
      padding: 56px 20px 40px;
    }

    .hero {
      text-align: center;
      margin-bottom: 28px;
      animation: fadeInUp 0.8s ease-out;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      background: linear-gradient(135deg, rgba(0,229,160,0.12), rgba(0,212,255,0.12));
      border: 1px solid rgba(0,229,160,0.18);
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--accent-green);
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0,229,160,0.08);
    }
    .hero-badge .dot { width: 8px; height: 8px; background: var(--accent-green); border-radius: 50%; box-shadow: 0 0 8px var(--accent-green); animation: pulse-glow 2s ease-in-out infinite; }
    @keyframes pulse-glow { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.8); } }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      animation: fadeInUp 0.8s ease-out 0.15s both;
      flex-wrap: wrap;
      gap: 12px;
    }
    .section-heading {
      font-size: 0.82rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--accent-green);
    }
    .toolbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .select, .btn {
      border: none;
      outline: none;
      font-family: inherit;
      transition: all 0.25s ease;
    }
    .select {
      padding: 11px 14px;
      background: rgba(255,255,255,0.9);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 0.92rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--text);
      background: rgba(255,255,255,0.86);
      border: 1px solid var(--border);
    }
    .btn:hover, .select:hover { background: rgba(255,255,255,0.12); border-color: var(--border-hover); }
    .btn-primary { background: linear-gradient(135deg, var(--accent-green), var(--accent-blue)); color: #000; border-color: transparent; box-shadow: 0 8px 28px rgba(0,229,160,0.18); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 35px rgba(0,229,160,0.25); }
    .btn-ghost { background: rgba(255,255,255,0.78); }
    .btn-icon {
      width: 36px;
      height: 36px;
      padding: 0;
      border-radius: 10px;
    }

    .chip-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 18px;
      animation: fadeInUp 0.8s ease-out 0.18s both;
    }
    .chip {
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .chip:hover { color: var(--text); border-color: var(--border-hover); background: rgba(255,255,255,0.86); }
    .chip.active { color: #fff; background: linear-gradient(135deg, var(--accent-green), var(--accent-blue)); border-color: transparent; }
    .chip.fav.active { background: linear-gradient(135deg, var(--star), #ff9f1a); }

    .section {
      margin-bottom: 26px;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .section-title {
      font-size: 0.82rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #0f766e;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }

    .card {
      background: var(--surface);
      backdrop-filter: blur(18px) saturate(1.2);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 12px;
      position: relative;
      overflow: hidden;
      transition: all 0.25s ease;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(16,32,51,0.08);
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(0,212,255,0.08), transparent 35%);
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }
    .card:hover { transform: translateY(-2px); border-color: var(--border-hover); background: var(--surface-hover); }
    .card:hover::before { opacity: 1; }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }
    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-size: 1.2rem;
      flex-shrink: 0;
      background: linear-gradient(135deg, rgba(0,229,160,0.08), rgba(0,212,255,0.08));
      border: 1px solid rgba(16,32,51,0.08);
    }
    .card-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
      opacity: 0.16;
      transform: translateY(-2px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .card:hover .card-actions,
    .card:focus-within .card-actions {
      opacity: 1;
      transform: translateY(0);
    }
    .card-body { position: relative; z-index: 1; margin-bottom: 12px; }
    .card-title { font-weight: 800; font-size: 0.95rem; margin-bottom: 3px; }
    .card-url { font-size: 0.76rem; color: var(--text-secondary); word-break: break-all; }

    .favorites-section[hidden], .section[hidden] { display: none !important; }
    .empty-state {
      text-align: center;
      padding: 34px 20px;
      color: var(--text-secondary);
      background: rgba(255,255,255,0.72);
      border: 1px dashed rgba(16,32,51,0.14);
      border-radius: 18px;
    }
    .empty-state-icon { font-size: 2rem; margin-bottom: 10px; opacity: 0.22; }

    .footer {
      text-align: center;
      margin-top: 30px;
      padding: 24px 0 10px;
      border-top: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.82rem;
    }
    .footer strong { color: var(--text); }

    .toast-container {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    .toast {
      background: linear-gradient(135deg, rgba(15,20,30,0.96), rgba(8,10,18,0.98));
      border: 1px solid var(--border-hover);
      border-radius: 14px;
      padding: 14px 18px;
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 600;
      box-shadow: 0 15px 40px rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      gap: 12px;
      transform: translateX(120%);
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
      pointer-events: auto;
      min-width: 260px;
    }
    .toast.show { transform: translateX(0); opacity: 1; }
    .toast-icon {
      width: 28px; height: 28px; border-radius: 50%;
      display: grid; place-items: center; font-size: 0.9rem;
      flex-shrink: 0;
    }
    .toast-success .toast-icon { background: rgba(0,229,160,0.15); color: var(--accent-green); }
    .toast-error .toast-icon { background: rgba(244,114,182,0.15); color: var(--accent-pink); }
    .toast-info .toast-icon { background: rgba(0,212,255,0.15); color: #0f766e; }

    .no-results {
      display: none;
      text-align: center;
      padding: 38px 18px;
      color: var(--text-secondary);
      background: rgba(255,255,255,0.72);
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: 20px;
      margin-top: 8px;
    }
    .no-results.show { display: block; }
    .no-results-icon { font-size: 2.3rem; margin-bottom: 10px; opacity: 0.22; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--accent-green), var(--accent-blue)); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, var(--accent-blue), var(--accent-purple)); }
    ::selection { background: linear-gradient(135deg, rgba(0,229,160,0.3), rgba(0,212,255,0.3)); color: #fff; }

    @media (max-width: 860px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
    }

    @media (max-width: 640px) {
      .container { padding: 38px 16px 32px; }
      .hero { padding: 16px 16px; border-radius: 24px; }
      .toolbar { align-items: flex-start; }
      .grid { grid-template-columns: 1fr; }
      .card-actions { opacity: 1; transform: none; }
      .toast-container { right: 16px; left: 16px; bottom: 16px; }
      .toast { min-width: unset; width: 100%; }
    }

    @media (max-width: 768px), (prefers-reduced-motion: reduce) {
      body { background-attachment: scroll; }
      .orb,
      .noise { display: none; }
      .hero,
      .toolbar,
      .chip-row,
      .card,
      .hero-badge { backdrop-filter: none; }
      .hero,
      .toolbar,
      .chip-row,
      .card { box-shadow: 0 10px 24px rgba(16,32,51,0.08); }
      .hero-badge .dot,
      .orb { animation: none; }
      .card::before { display: none; }
    }

    @media (max-width: 480px) {
      .toolbar-right { width: 100%; }
      .select { width: 100%; }
    }

  <div class="container">
    <header class="hero">
      <div class="hero-badge"><span class="dot"></span> Live Stream Hub</div>
    </header>

    <div class="toolbar">
      <div class="section-heading" id="allHeading">Semua Situs</div>
      <div class="toolbar-right">
        <select class="select" id="sortSelect" aria-label="Urutkan">
          <option value="recommended">Recommended</option>
          <option value="alphabet">A-Z</option>
          <option value="favorites">Favorit dulu</option>
        </select>
        <button class="btn btn-ghost" id="refreshBtn" type="button">↻ Reload</button>
        <button class="btn btn-primary" id="installBtn" type="button" hidden>＋ Install</button>
      </div>
    </div>

    <section class="section favorites-section" id="favoritesSection" hidden>
      <div class="section-header">
        <div class="section-title">⭐ Favorit</div>
      </div>
      <div class="grid" id="favoritesGrid"></div>
    </section>

    <section class="section">
      <div class="section-header">
        <div class="section-title" id="mainTitle"></div>
      </div>
      <main class="grid" id="cardGrid"></main>
    </section>

    <div class="no-results" id="noResults">
      <div class="no-results-icon">⚠️</div>
      <div>Belum ada link yang cocok untuk filter ini.</div>
    </div>

    <footer class="footer">
      <div><strong>BolaStream</strong> • link bisa berubah sewaktu-waktu</div>
      <div style="margin-top:6px">Web ringan • favorites tersimpan di browser • cepat dibuka di HP</div>
    </footer>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    const FALLBACK_LINKS = [
      { name: 'Starball TV', url: 'https://starballtv007.blogspot.com/', icon: '📡', color: 'green', category: 'Live TV', source: 'Blogspot', priority: 1 },
      { name: 'KLTraid', url: 'https://kltraid.pages.dev/', icon: '🖥️', color: 'blue', category: 'Live TV', source: 'Pages.dev', priority: 2 },
      { name: 'Pelota Libre TV', url: 'https://pelotalibretv.su/', icon: '📺', color: 'purple', category: 'Live TV', source: '.su', priority: 3 },
      { name: 'CarryFlix', url: 'https://carryflix.com/wp/', icon: '🎬', color: 'orange', category: 'Highlights', source: 'WordPress', priority: 4 },
      { name: 'Footy100', url: 'https://footy100.net', icon: '⚽', color: 'pink', category: 'Live TV', source: '.net', priority: 5 }
    ];

    const STORAGE = {
      favorites: 'bolastream_favorites',
      sort: 'bolastream_sort',
      build: 'bolastream_build'
    };

    const BUILD_ID = '2026-04-24-4';

    const state = {
      links: [...FALLBACK_LINKS],
      favorites: safeParse(localStorage.getItem(STORAGE.favorites), []),
      sort: localStorage.getItem(STORAGE.sort) || 'recommended',
    };

    let deferredPrompt = null;

    const el = {
      sortSelect: document.getElementById('sortSelect'),
      refreshBtn: document.getElementById('refreshBtn'),
      installBtn: document.getElementById('installBtn'),
      favoritesSection: document.getElementById('favoritesSection'),
      favoritesGrid: document.getElementById('favoritesGrid'),
      cardGrid: document.getElementById('cardGrid'),
      noResults: document.getElementById('noResults'),
    };

    function safeParse(value, fallback) {
      try {
        const parsed = value ? JSON.parse(value) : fallback;
        if (Array.isArray(fallback) && !Array.isArray(parsed)) return fallback;
        return parsed;
      } catch (e) {
        return fallback;
      }
    }

    async function clearLegacyClientState() {
      try {
        if (localStorage.getItem(STORAGE.build) === BUILD_ID) return;
        localStorage.setItem(STORAGE.build, BUILD_ID);
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map((reg) => reg.unregister()));
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }
      } catch (error) {
        console.debug('Cleanup skipped', error);
      }
    }

    function uniq(arr) { return [...new Set(arr.filter(Boolean))]; }

    function escapeHtml(str) {
      return String(str ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function hostFromUrl(url) {
      try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return 'Link'; }
    }

    function timeAgo(ts) {
      const diff = Math.max(0, Date.now() - Number(ts || 0));
      const s = Math.floor(diff / 1000);
      const m = Math.floor(s / 60);
      const h = Math.floor(m / 60);
      const d = Math.floor(h / 24);
      if (d > 0) return `${d} hari lalu`;
      if (h > 0) return `${h} jam lalu`;
      if (m > 0) return `${m} menit lalu`;
      return 'baru saja';
    }

    function normalizeLink(item, index = 0) {
      const link = { ...item };
      link.name = link.name || 'Untitled';
      link.url = link.url || '#';
      link.icon = link.icon || '🔗';
      link.color = link.color || 'green';
      link.category = link.category || 'Lainnya';
      link.source = link.source || hostFromUrl(link.url);
      link.priority = Number.isFinite(Number(link.priority)) ? Number(link.priority) : index + 1;
      return link;
    }

    function isFavorite(url) {
      return state.favorites.some((item) => item.url === url);
    }

    function toggleFavorite(event, item) {
      event.stopPropagation();
      event.preventDefault();
      const idx = state.favorites.findIndex((x) => x.url === item.url);
      if (idx >= 0) {
        state.favorites.splice(idx, 1);
        showToast('Dihapus dari favorit', 'info');
      } else {
        state.favorites.unshift(item);
        showToast('Ditambahkan ke favorit', 'success');
      }
      localStorage.setItem(STORAGE.favorites, JSON.stringify(state.favorites));
      renderAll();
    }

    function copyLink(event, url) {
      event.stopPropagation();
      event.preventDefault();
      navigator.clipboard.writeText(url).then(() => {
        showToast('Link disalin ke clipboard', 'success');
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = url;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('Link disalin ke clipboard', 'success');
      });
    }

    function openLink(event, item) {
      event.stopPropagation();
      event.preventDefault();
      window.open(item.url, '_blank', 'noopener,noreferrer');
    }

    function setSort(sort) {
      state.sort = sort;
      localStorage.setItem(STORAGE.sort, sort);
      renderAll();
    }

    function filteredLinks() {
      const links = [...state.links];
      if (state.sort === 'alphabet') {
        links.sort((a, b) => a.name.localeCompare(b.name, 'id'));
      } else if (state.sort === 'favorites') {
        links.sort((a, b) => Number(isFavorite(b.url)) - Number(isFavorite(a.url)) || a.name.localeCompare(b.name, 'id'));
      } else {
        links.sort((a, b) => Number(isFavorite(b.url)) - Number(isFavorite(a.url)) || a.priority - b.priority || a.name.localeCompare(b.name, 'id'));
      }
      return links;
    }

    function cardTemplate(item, opts = {}) {
      const favorite = isFavorite(item.url);
      return `
        <article class="card" data-url="${escapeHtml(item.url)}" data-name="${escapeHtml(item.name.toLowerCase())}" data-category="${escapeHtml(item.category.toLowerCase())}" data-source="${escapeHtml(item.source.toLowerCase())}" data-color="${escapeHtml(item.color || 'green')}">
          <div class="card-header">
            <div class="card-icon">${escapeHtml(item.icon)}</div>
            <div class="card-actions">
              <button class="btn btn-icon fav-btn" type="button" title="Favorit">${favorite ? '★' : '☆'}</button>
              <button class="btn btn-icon copy-btn" type="button" title="Copy link">📋</button>
              <button class="btn btn-icon open-btn" type="button" title="Buka tab baru">↗</button>
            </div>
          </div>
          <div class="card-body">
            <div class="card-title">${escapeHtml(item.name)}</div>
            <div class="card-url">${escapeHtml(hostFromUrl(item.url))}</div>
          </div>
        </article>
      `;
    }

    function renderFavorites() {
      const favs = state.favorites.filter(Boolean);
      if (!favs.length) {
        el.favoritesSection.hidden = true;
        el.favoritesGrid.innerHTML = '';
        return;
      }
      el.favoritesSection.hidden = false;
      el.favoritesGrid.innerHTML = favs.map((item) => cardTemplate(item)).join('');
      attachCardBehaviors(el.favoritesGrid);
    }

    function renderMain() {
      const items = filteredLinks();
      el.cardGrid.innerHTML = items.length ? items.map((item) => cardTemplate(item)).join('') : '';
      attachCardBehaviors(el.cardGrid);
      el.noResults.hidden = items.length > 0;
      el.mainTitle.textContent = '';
    }

    function updateStats() {
      // intentionally left minimal for the clean layout
    }

    function attachCardBehaviors(root) {
      root.querySelectorAll('.card').forEach((card) => {
        const url = card.dataset.url;
        const item = state.links.find((link) => link.url === url) || state.favorites.find((link) => link.url === url) || { url };
        const favBtn = card.querySelector('.fav-btn');
        const copyBtn = card.querySelector('.copy-btn');
        const openBtn = card.querySelector('.open-btn');

        card.removeEventListener('mousemove', onCardMouseMove);
        card.addEventListener('mousemove', onCardMouseMove);
        card.removeEventListener('click', onCardClick);
        card.addEventListener('click', onCardClick);

        favBtn && favBtn.addEventListener('click', (event) => toggleFavorite(event, item));
        copyBtn && copyBtn.addEventListener('click', (event) => copyLink(event, item.url));
        openBtn && openBtn.addEventListener('click', (event) => openLink(event, item));
      });
    }

    function onCardMouseMove(e) {
      const rect = this.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width) * 100;
      const y = ((e.clientY - rect.top) / rect.height) * 100;
      this.style.setProperty('--mouse-x', `${x}%`);
      this.style.setProperty('--mouse-y', `${y}%`);
    }

    function onCardClick(e) {
      if (e.target.closest('button')) return;
      const url = this.dataset.url;
      const item = state.links.find((link) => link.url === url) || state.favorites.find((link) => link.url === url) || { url };
      openLink(e, item);
    }

    function renderAll() {
      renderFavorites();
      renderMain();
      updateStats();
      const noMain = !el.cardGrid.querySelector('.card');
      const noFavs = el.favoritesSection.hidden || !el.favoritesGrid.querySelector('.card');
      el.noResults.classList.toggle('show', noMain && noFavs);
    }

    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = 'toast toast-' + type;
      const icon = type === 'error' ? '✕' : type === 'info' ? 'i' : '✓';
      toast.innerHTML = `<span class="toast-icon">${icon}</span><span>${escapeHtml(message)}</span>`;
      container.appendChild(toast);
      requestAnimationFrame(() => toast.classList.add('show'));
      setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 2600);
    }

    async function loadLinks() {
      try {
        const res = await fetch('links.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('links.json tidak bisa dibaca');
        const data = await res.json();
        if (Array.isArray(data) && data.length) {
          state.links = data.map(normalizeLink);
          showToast('Data link berhasil dimuat', 'info');
        }
      } catch (error) {
        state.links = FALLBACK_LINKS.map(normalizeLink);
        showToast('Pakai data lokal fallback', 'info');
      }
      renderAll();
    }

    function registerPWA() {
      // Web-only mode: stop registering service workers so old cache can't linger.
      clearLegacyClientState();
    }

    el.sortSelect.value = state.sort;
    el.sortSelect.addEventListener('change', (e) => setSort(e.target.value));
    el.refreshBtn.addEventListener('click', () => loadLinks());

    window.addEventListener('beforeinstallprompt', (event) => {
      event.preventDefault();
      deferredPrompt = event;
      el.installBtn.hidden = false;
    });

    el.installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const choice = await deferredPrompt.userChoice.catch(() => ({ outcome: 'dismissed' }));
      deferredPrompt = null;
      el.installBtn.hidden = true;
      showToast(choice.outcome === 'accepted' ? 'App siap di-install' : 'Install dibatalkan', choice.outcome === 'accepted' ? 'success' : 'info');
    });

    window.toggleFavorite = toggleFavorite;
    window.copyLink = copyLink;
    window.openLink = openLink;

    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
      }
    });

    renderAll();
    loadLinks();
    registerPWA();
  </script>
</body>
</html>
