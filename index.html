<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#047857">
  <meta name="description" content="BolaStream — kumpulan link nonton bola yang rapi dan siap dibuka cepat.">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <title>⚽ BolaStream — Link Nonton Bola Live</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --grass-dark: #047857;
      --grass: #059669;
      --grass-light: #10b981;
      --gold: #fbbf24;
      --gold-light: #fcd34d;
      --bg-dark: #0a0f0d;
      --bg: #0f1612;
      --surface: rgba(15, 22, 18, 0.95);
      --surface-hover: rgba(20, 30, 24, 0.98);
      --border: rgba(16, 185, 129, 0.15);
      --border-hover: rgba(16, 185, 129, 0.35);
      --text: #f0fdf4;
      --text-secondary: #86efac;
      --shadow-green: rgba(4, 120, 87, 0.4);
      --shadow-gold: rgba(251, 191, 36, 0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    
    body {
      background:
        radial-gradient(circle at 15% 15%, rgba(4, 120, 87, 0.25), transparent 30%),
        radial-gradient(circle at 85% 20%, rgba(251, 191, 36, 0.18), transparent 28%),
        radial-gradient(circle at 50% 90%, rgba(16, 185, 129, 0.15), transparent 32%),
        linear-gradient(180deg, #0a0f0d 0%, #0f1612 50%, #0a0f0d 100%);
      background-attachment: fixed;
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Stadium lights effect */
    .stadium-light {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
      animation: pulse-light 8s ease-in-out infinite;
    }
    .light-1 { 
      background: radial-gradient(circle, rgba(251, 191, 36, 0.4), transparent 70%); 
      top: -200px; 
      left: -150px; 
    }
    .light-2 { 
      background: radial-gradient(circle, rgba(4, 120, 87, 0.35), transparent 70%); 
      top: 30%; 
      right: -200px; 
      animation-delay: -3s; 
    }
    .light-3 { 
      background: radial-gradient(circle, rgba(16, 185, 129, 0.3), transparent 70%); 
      bottom: -150px; 
      left: 20%; 
      animation-delay: -6s; 
    }
    @keyframes pulse-light {
      0%, 100% { opacity: 0.15; transform: scale(1); }
      50% { opacity: 0.25; transform: scale(1.1); }
    }

    /* Field lines pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(16, 185, 129, 0.03) 49px, rgba(16, 185, 129, 0.03) 50px),
        repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(16, 185, 129, 0.03) 49px, rgba(16, 185, 129, 0.03) 50px);
      z-index: 0;
      pointer-events: none;
      opacity: 0.4;
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 24px 48px;
    }

    /* Hero Section */
    .hero {
      text-align: center;
      margin-bottom: 40px;
      animation: slideDown 0.8s ease-out;
      position: relative;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 24px;
      background: linear-gradient(135deg, rgba(4, 120, 87, 0.95), rgba(16, 185, 129, 0.85));
      border: 2px solid rgba(251, 191, 36, 0.3);
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 24px;
      backdrop-filter: blur(12px);
      box-shadow: 
        0 0 30px var(--shadow-green),
        0 10px 40px rgba(0, 0, 0, 0.4);
      animation: glow-pulse 3s ease-in-out infinite;
    }

    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 30px var(--shadow-green), 0 10px 40px rgba(0, 0, 0, 0.4); }
      50% { box-shadow: 0 0 50px var(--shadow-gold), 0 10px 40px rgba(0, 0, 0, 0.4); }
    }

    .hero-badge .dot {
      width: 10px;
      height: 10px;
      background: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--gold);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(0.85); }
    }

    .hero-title {
      font-size: 3.5rem;
      font-weight: 900;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #fbbf24 0%, #10b981 50%, #fbbf24 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shine 3s linear infinite;
      text-shadow: 0 0 40px rgba(251, 191, 36, 0.3);
      letter-spacing: -0.02em;
    }

    @keyframes shine {
      to { background-position: 200% center; }
    }

    .hero-subtitle {
      font-size: 1.1rem;
      color: var(--text-secondary);
      font-weight: 600;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding: 20px 24px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(4, 120, 87, 0.15), rgba(16, 185, 129, 0.10));
      border: 2px solid var(--border);
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      animation: slideDown 0.8s ease-out 0.2s both;
      flex-wrap: wrap;
      gap: 16px;
    }

    .section-heading {
      font-size: 0.9rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-heading::before {
      content: '⚽';
      font-size: 1.3rem;
      animation: spin-ball 4s linear infinite;
    }

    @keyframes spin-ball {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 24px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 800;
      border: none;
      outline: none;
      font-family: inherit;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--bg-dark);
      box-shadow: 0 12px 30px var(--shadow-gold);
      border: 2px solid transparent;
    }

    .btn-primary:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 16px 40px var(--shadow-gold);
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      animation: fadeIn 0.8s ease-out 0.4s both;
    }

    /* Card */
    .card {
      background: linear-gradient(135deg, rgba(4, 120, 87, 0.12), rgba(15, 22, 18, 0.95));
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 2px solid var(--border);
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      cursor: pointer;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--gold), var(--grass-light));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: var(--border-hover);
      box-shadow: 
        0 30px 60px rgba(0, 0, 0, 0.4),
        0 0 40px var(--shadow-green);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .card-icon {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 1.5rem;
      flex-shrink: 0;
      background: linear-gradient(135deg, rgba(251, 191, 36, 0.2), rgba(16, 185, 129, 0.15));
      border: 2px solid rgba(251, 191, 36, 0.3);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .card-actions {
      display: flex;
      gap: 8px;
      opacity: 0;
      transform: translateY(-4px);
      transition: all 0.3s ease;
    }

    .card:hover .card-actions {
      opacity: 1;
      transform: translateY(0);
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      padding: 0;
      border-radius: 10px;
      background: rgba(4, 120, 87, 0.3);
      border: 1px solid var(--border);
      color: var(--text);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-icon:hover {
      background: rgba(16, 185, 129, 0.4);
      border-color: var(--border-hover);
      transform: scale(1.1);
    }

    .card-body {
      margin-bottom: 16px;
    }

    .card-title {
      font-weight: 800;
      font-size: 1.1rem;
      margin-bottom: 6px;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .card-url {
      font-size: 0.8rem;
      color: var(--text-secondary);
      word-break: break-all;
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(16, 185, 129, 0.1);
      font-weight: 600;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 60px;
      padding: 32px 0 16px;
      border-top: 2px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .footer strong {
      color: var(--gold);
      font-weight: 900;
    }

    /* Toast */
    .toast-container {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: none;
    }

    .toast {
      background: linear-gradient(135deg, rgba(4, 120, 87, 0.98), rgba(15, 22, 18, 0.98));
      border: 2px solid var(--border-hover);
      border-radius: 16px;
      padding: 16px 20px;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 700;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      gap: 14px;
      transform: translateX(120%);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: auto;
      min-width: 280px;
      backdrop-filter: blur(20px);
    }

    .toast.show {
      transform: translateX(0);
      opacity: 1;
    }

    .toast-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .toast-success .toast-icon {
      background: rgba(16, 185, 129, 0.2);
      color: var(--grass-light);
    }

    .toast-error .toast-icon {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
    }

    /* Animations */
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-dark);
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, var(--grass), var(--gold));
      border-radius: 5px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, var(--gold), var(--grass-light));
    }

    /* Responsive */
    @media (max-width: 768px) {
      .hero-title {
        font-size: 2.5rem;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .toolbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .card-actions {
        opacity: 1;
        transform: none;
      }

      .toast-container {
        right: 16px;
        left: 16px;
        bottom: 16px;
      }

      .toast {
        min-width: unset;
        width: 100%;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 40px 16px 32px;
      }

      .hero-title {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="stadium-light light-1"></div>
  <div class="stadium-light light-2"></div>
  <div class="stadium-light light-3"></div>

  <div class="container">
    <header class="hero">
      <div class="hero-badge">
        <span class="dot"></span>
        Live Stadium
      </div>
      <h1 class="hero-title">⚽ BolaStream</h1>
      <p class="hero-subtitle">Link Nonton Bola Live — Cepat & Gratis</p>
    </header>

    <div class="toolbar">
      <div class="section-heading">Semua Channel</div>
      <div>
        <button class="btn btn-primary" id="installBtn" type="button" hidden>
          ⚡ Install App
        </button>
      </div>
    </div>

    <section>
      <main class="grid" id="cardGrid"></main>
    </section>

    <footer class="footer">
      <div><strong>⚽ BolaStream</strong> • Link bisa berubah sewaktu-waktu</div>
      <div style="margin-top:8px">Web ringan • Cepat dibuka di HP</div>
    </footer>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/clipboard.js/2.0.11/clipboard.min.js"></script>
  <script>
    const FALLBACK_LINKS = [
      { name: 'Starball TV', url: 'https://starballtv007.blogspot.com/', icon: '📡', color: 'green' },
      { name: 'KLTraid', url: 'https://kltraid.pages.dev/', icon: '🖥️', color: 'blue' },
      { name: 'Pelota Libre TV', url: 'https://pelotalibretv.su/', icon: '📺', color: 'purple' },
      { name: 'CarryFlix', url: 'https://carryflix.com/wp/', icon: '🎬', color: 'orange' },
      { name: 'Footy100', url: 'https://footy100.net', icon: '⚽', color: 'pink' }
    ];

    const state = { links: [...FALLBACK_LINKS] };
    let deferredPrompt = null;

    const el = {
      installBtn: document.getElementById('installBtn'),
      cardGrid: document.getElementById('cardGrid'),
      toastContainer: document.getElementById('toastContainer')
    };

    function escapeHtml(str) {
      return String(str ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function hostFromUrl(url) {
      try {
        return new URL(url).hostname.replace(/^www\./, '');
      } catch {
        return url;
      }
    }

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `
        <div class="toast-icon">${type === 'success' ? '✓' : '✕'}</div>
        <div>${escapeHtml(message)}</div>
      `;
      el.toastContainer.appendChild(toast);
      
      requestAnimationFrame(() => {
        toast.classList.add('show');
      });

      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 400);
      }, 3000);
    }

    function copyToClipboard(text) {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(
          () => showToast('Link disalin!'),
          () => showToast('Gagal menyalin', 'error')
        );
      } else {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        try {
          document.execCommand('copy');
          showToast('Link disalin!');
        } catch {
          showToast('Gagal menyalin', 'error');
        }
        document.body.removeChild(textarea);
      }
    }

    function renderCards() {
      el.cardGrid.innerHTML = state.links.map((link, idx) => `
        <div class="card" data-color="${link.color || 'green'}">
          <div class="card-header">
            <div class="card-icon">${escapeHtml(link.icon || '🌐')}</div>
            <div class="card-actions">
              <button class="btn-icon" onclick="copyToClipboard('${escapeHtml(link.url)}')" title="Salin link">
                📋
              </button>
              <button class="btn-icon" onclick="window.open('${escapeHtml(link.url)}', '_blank')" title="Buka di tab baru">
                ↗
              </button>
            </div>
          </div>
          <div class="card-body">
            <div class="card-title">${escapeHtml(link.name)}</div>
            <div class="card-url">${escapeHtml(hostFromUrl(link.url))}</div>
          </div>
        </div>
      `).join('');
    }

    async function loadLinks() {
      try {
        const response = await fetch('links.json?t=' + Date.now());
        if (response.ok) {
          const data = await response.json();
          if (Array.isArray(data) && data.length > 0) {
            state.links = data;
          }
        }
      } catch (error) {
        console.debug('Using fallback links', error);
      }
      renderCards();
    }

    // PWA Install
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      el.installBtn.hidden = false;
    });

    el.installBtn?.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        showToast('App terinstall!');
      }
      deferredPrompt = null;
      el.installBtn.hidden = true;
    });

    // Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    // Init
    loadLinks();
  </script>
</body>
</html>
